<script src="demo-part2.js"></script>
<script>
// === THEME MANAGEMENT ===
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('xboard-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.theme === theme);
  });
}

// Init theme from localStorage or default to system
(function() {
  const saved = localStorage.getItem('xboard-theme') || 'system';
  setTheme(saved);
})();

// === MOBILE SIDEBAR ===
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.querySelector('.sb-overlay');
  const hamburger = document.querySelector('.hamburger');
  sb.classList.toggle('open');
  overlay.classList.toggle('show');
  if (hamburger) hamburger.classList.toggle('open');
  document.body.style.overflow = sb.classList.contains('open') ? 'hidden' : '';
}

function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.querySelector('.sb-overlay');
  const hamburger = document.querySelector('.hamburger');
  sb.classList.remove('open');
  overlay.classList.remove('show');
  if (hamburger) hamburger.classList.remove('open');
  document.body.style.overflow = '';
}

// Close sidebar on page navigation (mobile)
const origGo = typeof go === 'function' ? go : null;
if (origGo) {
  window.go = function(pg) {
    origGo(pg);
    if (window.innerWidth <= 768) closeSidebar();
  };
}

// Close sidebar on resize to desktop
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) closeSidebar();
});
</script>
</body></html>
